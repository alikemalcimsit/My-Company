version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: ai_company_db
    restart: always
    environment:
      POSTGRES_USER: aicompany
      POSTGRES_PASSWORD: aicompany123
      POSTGRES_DB: aicompany
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai_company_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: